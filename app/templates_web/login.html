<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive.css') }}">
  <style>
    /* Enhanced Login Button Styles for Better Visibility */
    .login-container {
      background: rgba(255, 255, 255, 0.95) !important;
      border: 1px solid rgba(255, 255, 255, 0.8) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1) !important;
    }

    .btn {
      position: relative !important;
      z-index: 10 !important;
      border: 2px solid rgba(0, 0, 0, 0.1) !important;
      font-weight: 600 !important;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1) !important;
    }

    .google {
      background: #4285F4 !important;
      border-color: #357ae8 !important;
      box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3) !important;
    }

    .google:hover {
      background: #357ae8 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4) !important;
    }

    .outlook {
      background: #0078D4 !important;
      border-color: #005ea6 !important;
      box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3) !important;
    }

    .outlook:hover {
      background: #005ea6 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 20px rgba(0, 120, 212, 0.4) !important;
    }

    .yahoo {
      background: #5f2eea !important;
      border-color: #4d1fd1 !important;
      box-shadow: 0 4px 15px rgba(95, 46, 234, 0.3) !important;
    }

    .yahoo:hover {
      background: #4d1fd1 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 20px rgba(95, 46, 234, 0.4) !important;
    }

    .imap {
      background: #28a745 !important;
      border-color: #1e7e34 !important;
      box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3) !important;
    }

    .imap:hover {
      background: #1e7e34 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4) !important;
    }

    /* Enhanced text visibility */
    h2 {
      color: #333 !important;
      font-weight: 700 !important;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1) !important;
    }

    /* Ensure proper text contrast */
    body {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%) !important;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="login-container">
    <h2>User Login</h2>

    <a class="btn google" href="/login/google">
      <img src="{{ url_for('static', filename='logos/google.svg') }}" alt="Google logo">
      Continue with Google
    </a>

    <a class="btn outlook" href="/login/outlook">
      <img src="{{ url_for('static', filename='logos/outlook.svg') }}" alt="Outlook logo">
      Continue with Outlook
    </a>

    <a class="btn yahoo" href="/login/yahoo">
      <img src="{{ url_for('static', filename='logos/yahoo.svg') }}" alt="Yahoo logo">
      Continue with Yahoo
    </a>

    <div style="margin: 20px 0; text-align: center; color: #666; font-size: 0.9em;">
      ────────── or ──────────
    </div>

    <a class="btn imap" href="/login/imap" style="background: #28a745; color: white;">
      📧 Connect Custom Email
    </a>

    <div style="margin-top: 16px; font-size: 0.8em; color: #888; text-align: center; line-height: 1.4;">
      <strong>Custom Email supports:</strong><br>
      Gmail, Outlook, Yahoo, and any email provider<br>
      (including custom domains like company.com)
    </div>

    <div style="margin-top: 24px; font-size: 0.9em; color: #666; text-align: center;">
      By continuing, you agree to our Terms and Privacy Policy.
    </div>
  </div>
</body>
</html>
