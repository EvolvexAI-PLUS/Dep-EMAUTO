<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout Confirmation - EmailAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 1px solid #e5e7eb;
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #667eea;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 1rem;
    }

    .message {
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      min-width: 120px;
    }

    .btn-primary {
      background: #dc2626;
      color: white;
    }

    .btn-primary:hover {
      background: #b91c1c;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f8fafc;
      color: #6b7280;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      color: #374151;
    }

    .security-note {
      margin-top: 2rem;
      padding: 1rem;
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #92400e;
    }

    .security-note strong {
      display: block;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">✨</div>
      <div class="emoji">👋</div>
      <h1 class="title">Logout Confirmation</h1>
      <p class="message">
        Are you sure you want to log out? You'll need to sign in again to access your EmailAI dashboard and continue using our services.
      </p>

      <form action="/logout" method="POST" style="display: inline; margin: 0;">
        <input type="hidden" name="_csrf_token" value="{{ request.cookies.get('csrf_token', '') }}">
        <button type="submit" class="btn btn-primary">Yes, Logout</button>
      </form>
      <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>

      <div class="security-note">
        <strong>🔒 Security Note</strong>
        Logging out will securely end your current session and clear all authentication data from your browser.
      </div>
    </div>
  </div>
</body>
</html>
